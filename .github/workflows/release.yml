name: Release Pipeline

on:
  push:
    branches:
      - main # Or your default branch

permissions:
  contents: write
  pull-requests: write # Required for release-please to open PRs

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Map the outputs from the step so the next job can read them
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.LOS_AUTO_BOT_RP_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    needs: release-please
    # ONLY run this job if release-please just merged the PR and created a release
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # CRITICAL: We must checkout the exact tag created by release-please,
          # otherwise GoReleaser will fail to map the build to the correct version.
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
